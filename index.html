<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOUND YOUR GIRL</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  overflow-x: hidden;
}

.page {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: #000;
}

.video-box {
  width: 100%;
}

video {
  width: 100%;
  max-height: 75vh;
  object-fit: contain;
  display: block;
  background: #000;
}

video::-webkit-media-controls-fullscreen-button {
  display: none !important;
}

video::-webkit-media-controls-overflow-button {
  display: none !important;
}

/* BUTTON */
.fullscreen-wrap{
  padding:15px;
  display:flex;
  justify-content:center;
}

.fullscreen-btn{
  width:100%;
  max-width:420px;
  text-align:center;
  background:#ff0033;
  color:#fff;
  text-decoration:none;
  font-size:18px;
  font-weight:700;
  padding:16px 20px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(255,0,51,.4);
  transition:.2s ease;
  letter-spacing:.5px;
}

.fullscreen-btn:hover{
  background:#ff1744;
}

.fullscreen-btn:active{
  transform:scale(.98);
}

.rec-title {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 15px 6px;
}

.native-wrap {
  padding: 10px;
  display: flex;
  justify-content: center;
}

.banner-300 {
  display: flex;
  justify-content: center;
  padding: 15px 0 30px;
}
</style>
</head>

<body>

<div class="page">

<!-- VIDEO -->
<div class="video-box">
<video 
id="player"
controls
autoplay
muted
playsinline
preload="metadata"
poster="https://via.placeholder.com/480x720?text=Loading..."
controlsList="nodownload noremoteplayback"
disablePictureInPicture
>
<source id="videoSource" src="" type="video/mp4">
</video>
</div>

<!-- DIRECT LINK BUTTON -->
<div class="fullscreen-wrap">
  <a 
    href="https://brewdismaychest.com/xmj0tup7m?key=ec38fd4a1c9eb79b5968a6db8d42ae05"
    target="_blank"
    class="fullscreen-btn"
  >
    FULL SCREEN
  </a>
</div>

<div class="rec-title">
🔥 Trending Videos
</div>

<!-- ✅ NATIVE BANNER -->
<div class="native-wrap">
<script async="async" data-cfasync="false" src="https://brewdismaychest.com/aa07e5156e3bde06cc9c46c75653774f/invoke.js"></script>
<div id="container-aa07e5156e3bde06cc9c46c75653774f"></div>
</div>

<!-- ✅ BANNER 300x250 -->
<div class="banner-300">
<script>
  atOptions = {
    'key' : '43d32f3264c4bf7923379562345f0c1f',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://brewdismaychest.com/43d32f3264c4bf7923379562345f0c1f/invoke.js"></script>
</div>

</div>

<script>
(function () {

const params = new URLSearchParams(window.location.search);
let video = params.get("v");

if (video) {
  if (!video.startsWith("http")) {
    video = "https://cdn.videy.co/" + video;
  }

  if (!video.endsWith(".mp4")) {
    video = "https://cdn.videy.co/k84OOz1w1.mp4";
  }

} else {
  video = "https://cdn.videy.co/k84OOz1w1.mp4";
}

const player = document.getElementById("player");
const source = document.getElementById("videoSource");

source.src = video;
player.load();

// autoplay fix
player.play().catch(() => {});

// anti klik kanan
player.addEventListener("contextmenu", e => e.preventDefault());

// ✅ POPUNDER
player.addEventListener("click", function () {
  if (!window.popShown) {
    window.popShown = true;

    var s = document.createElement("script");
    s.src = "https://brewdismaychest.com/d2/7a/b4/d27ab410a890f87de3cd808380b844c8.js";
    document.body.appendChild(s);
  }
});

})();
</script>

</body>
</html>
